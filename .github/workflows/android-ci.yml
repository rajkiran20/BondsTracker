name: Android CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    outputs:
      release_tag: ${{ steps.generate_tag.outputs.tag }}

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout the code
      # ─────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commit log generation

      # ─────────────────────────────────────────
      # Setup Java (required for Android builds)
      # ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─────────────────────────────────────────
      # Cache Gradle dependencies
      # ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─────────────────────────────────────────
      # Make gradlew executable
      # ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ─────────────────────────────────────────
      # 2. Run assembleDebug
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ─────────────────────────────────────────
      # Generate a unique release tag
      # ─────────────────────────────────────────
      - name: Generate Release Tag
        id: generate_tag
        run: |
          TAG="release-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      # ─────────────────────────────────────────
      # Upload APK artifact (passed to release job)
      # ─────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  # ───────────────────────────────────────────────────────
  # Create GitHub Release with APK and commit changelog
  # ───────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to create releases and tags

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to walk back to the last release tag

      # ─────────────────────────────────────────
      # Download the APK from the build job
      # ─────────────────────────────────────────
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: ./artifacts

      # ─────────────────────────────────────────
      # Verify APK exists before proceeding
      # ─────────────────────────────────────────
      - name: Verify APK
        run: |
          echo "Contents of artifacts directory:"
          ls -lh ./artifacts/
          test -f ./artifacts/app-debug.apk \
            && echo "✅ APK found" \
            || (echo "❌ APK not found" && exit 1)

      # ─────────────────────────────────────────
      # Rename APK to include timestamp and SHA
      # ─────────────────────────────────────────
      - name: Rename APK
        id: rename_apk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP="$(date +'%Y%m%d%H%M%S')"
          NEW_NAME="app-debug-${TIMESTAMP}-${SHORT_SHA}.apk"
          mv ./artifacts/app-debug.apk ./artifacts/${NEW_NAME}
          echo "apk_name=${NEW_NAME}" >> $GITHUB_OUTPUT
          echo "Renamed APK to: ${NEW_NAME}"

      # ─────────────────────────────────────────
      # Build the changelog from commits since
      # the last release tag. Falls back to all
      # commits if no previous release exists.
      # ─────────────────────────────────────────
      - name: Generate Changelog
        id: changelog
        run: |
          # Fetch all tags so we can find the latest release tag
          git fetch --tags

          # Find the most recent tag that matches our release naming pattern
          LAST_TAG=$(git tag --list 'release-*' \
            --sort=-creatordate \
            | head -n 1)

          echo "Last release tag: '${LAST_TAG}'"

          if [ -z "${LAST_TAG}" ]; then
            echo "No previous release tag found. Listing all commits."
            # No previous release — include every commit up to HEAD
            COMMIT_LOG=$(git log HEAD \
              --pretty=format:"- [%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H) %s — _%an_" \
              --no-merges)
          else
            echo "Generating changelog since tag: ${LAST_TAG}"
            # Include only commits that happened after the last release tag
            COMMIT_LOG=$(git log "${LAST_TAG}..HEAD" \
              --pretty=format:"- [%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H) %s — _%an_" \
              --no-merges)
          fi

          # Handle the edge case where there are no new commits
          if [ -z "${COMMIT_LOG}" ]; then
            COMMIT_LOG="_No new commits since the last release._"
          fi

          echo "Changelog:"
          echo "${COMMIT_LOG}"

          # Write to a dedicated file to safely preserve
          # newlines and special characters across steps
          echo "${COMMIT_LOG}" > changelog.txt

          # Also store the last tag for use in the release body
          echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # Create the GitHub Release
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: "🚀 Debug Build — ${{ needs.build.outputs.release_tag }}"
          body: |
            ## ✅ Automated Debug Build

            | Field      | Value                                     |
            |------------|-------------------------------------------|
            | **Branch** | `${{ github.ref_name }}`                  |
            | **Commit** | `${{ github.sha }}`                       |
            | **Author** | ${{ github.event.pusher.name }}           |
            | **Built At** | ${{ github.event.head_commit.timestamp }} |

            ---

            ## 📋 Changes Since Last Release
            > Commits since `${{ steps.changelog.outputs.last_tag || 'the beginning of the repository' }}`

            $(cat changelog.txt)

            ---

            ## 📦 Artifacts
            The debug APK is attached below. Download and install it directly on your device.

            ---
            _This release was created automatically by GitHub Actions._
          files: ./artifacts/${{ steps.rename_apk.outputs.apk_name }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  firebase-distribution:
    name: Upload Release to Firebase App Distribution
    runs-on: ubuntu-latest
    steps:
      # ─────────────────────────────────────────
      # 1. Checkout the code
      # ─────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Set up JDK 17
      # ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─────────────────────────────────────────
      # 3. Grant execute permission for gradlew
      # ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ─────────────────────────────────────────
      # 4. Build and Upload Release to Firebase App Distribution
      # ─────────────────────────────────────────
      - name: Build and Upload Release
        run: ./gradlew assembleRelease app:appDistributionUploadRelease
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_RELEASE_NOTES: "Release build uploaded automatically via GitHub Actions."