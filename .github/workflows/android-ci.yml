name: Android CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  release:
    name: Distribute on Firebase
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Generate Changelog
      - name: Generate Changelog
        id: changelog
        run: |
          git fetch --tags
          LAST_TAG=$(git tag --list 'release-*' --sort=-creatordate | head -n 1)
          echo "Last release tag: '${LAST_TAG}'"
          if [ -z "${LAST_TAG}" ]; then
            COMMIT_LOG=$(git log HEAD --pretty=format:"- [%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H) %s — _%an_" --no-merges)
          else
            COMMIT_LOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- [%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H) %s — _%an_" --no-merges)
          fi
          if [ -z "${COMMIT_LOG}" ]; then
            COMMIT_LOG="_No new commits since the last release._"
          fi
          echo "${COMMIT_LOG}" > changelog.txt
          echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT

      # Upload to Firebase App Distribution
      - name: Upload to Firebase App Distribution
        run: ./gradlew assembleRelease appDistributionUploadRelease
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GROUPS: "bonds-tracker-testers"
          RELEASE_NOTES_FILE: "changelog.txt"
